name: ci

on:
  push:
    branches: [main, dev, sandbox]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
      - "templates/**/*.tera"
      - "themes/**/*.toml"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
      - "templates/**/*.tera"
      - "themes/**/*.toml"

jobs:
  ci:
    name: build axtc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: taiki-e/install-action@cargo-make

      - name: Build (release)
        id: build
        run: cargo make build-release

      - name: Lint
        if: steps.build.outcome == 'success'
        run: cargo make lint-strict

      - name: Test
        if: steps.build.outcome == 'success'
        run: cargo make test

      - name: Doc
        if: steps.build.outcome == 'success'
        run: cargo make doc-strict
